<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Policy Badger — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #0f1729;
      --accent:  #4f8ef7;
      --border:  #e4e8f0;
      --text:    #1c2333;
      --muted:   #8892a4;
      --surface: #f7f8fc;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--surface);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #4f8ef7 0%, #7c5be6 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo-text h1 {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
    }

    .logo-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 18px;
      color: var(--text);
      background: var(--surface);
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.12);
      background: #fff;
    }

    button[type="submit"] {
      width: 100%;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { background: #1a2540; }

    .error {
      background: #fff1f1;
      color: #c0392b;
      border: 1px solid #ffd5d5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #c0c8d8;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🦡</div>
      <div class="logo-text">
        <h1>Policy Badger</h1>
        <p>Company Policy Assistant</p>
      </div>
    </div>

    <h2>Sign in</h2>
    <p class="subtitle">Enter your credentials to continue.</p>

    <!--ERROR-->

    <form method="POST" action="/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Username" required autofocus />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Password" required />

      <button type="submit">Sign in</button>
    </form>

    <div class="footer">Policy Badger · Raymond</div>
  </div>
</body>
</html>
