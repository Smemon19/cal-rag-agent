runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 3
  concurrency: 80

env:
  - variable: APP_USER
    value: Test
  - variable: APP_PASSWORD
    secret: APP_PASSWORD
  - variable: APP_SECRET_KEY
    secret: APP_SECRET_KEY
  - variable: DB_HOST
    secret: DB_HOST
  - variable: DB_PORT
    value: "5432"
  - variable: DB_NAME
    secret: DB_NAME
  - variable: DB_USER
    secret: DB_USER
  - variable: DB_PASSWORD
    secret: DB_PASSWORD
  - variable: OPENAI_API_KEY
    secret: OPENAI_API_KEY
